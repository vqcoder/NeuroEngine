name: Dashboard

on:
  push:
    branches: [main]
    paths:
      - "apps/dashboard/**"
  pull_request:
    paths:
      - "apps/dashboard/**"

concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=apps/dashboard

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=apps/dashboard
