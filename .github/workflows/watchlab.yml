name: WatchLab

on:
  push:
    branches: [main]
    paths:
      - "apps/watchlab/**"
      - "packages/common/**"
  pull_request:
    paths:
      - "apps/watchlab/**"
      - "packages/common/**"

concurrency:
  group: watchlab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watchlab:
    name: WatchLab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=apps/watchlab

      - name: Build
        run: npm run build --workspace=apps/watchlab
