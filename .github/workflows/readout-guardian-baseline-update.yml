name: Readout Guardian Baseline Update

on:
  workflow_dispatch:
    inputs:
      metadata_path:
        description: "Approved training metadata path (under ml/training/approved_runs)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-baseline:
    name: refresh-baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate metadata path input
        run: |
          case "${{ inputs.metadata_path }}" in
            ml/training/approved_runs/*.json) ;;
            *)
              echo "metadata_path must be under ml/training/approved_runs/*.json"
              exit 1
              ;;
          esac

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: services/biograph_api
        run: uv sync --extra dev

      - name: Update guardian baseline from approved metadata
        working-directory: services/biograph_api
        run: |
          uv run python -m app.readout_guardian \
            --update-baseline \
            --training-metadata "../../${{ inputs.metadata_path }}"

      - name: Re-validate guardian after update
        working-directory: services/biograph_api
        run: |
          uv run python -m app.readout_guardian --print-report
          uv run python -m pytest -q -p no:cacheprovider \
            tests/test_readout_guardian.py \
            tests/test_readout_guardian_metadata_link.py \
            tests/test_readout_config_alignment.py

      - name: Detect baseline changes
        id: changes
        run: |
          if git diff --quiet -- services/biograph_api/app/readout_guardian_baseline.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create baseline refresh PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh readout guardian baseline from approved metadata"
          title: "Refresh readout guardian baseline"
          body: |
            Automated readout guardian baseline refresh.
            Source metadata: `${{ inputs.metadata_path }}`
          branch: "codex/readout-guardian-baseline-${{ github.run_id }}"
          base: main
          add-paths: |
            services/biograph_api/app/readout_guardian_baseline.json
